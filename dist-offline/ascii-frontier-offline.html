ll, {curse}.","I count {hull}% hull on you, {cmdr}. Not for long.","Wing, mark the {ship} \u2014 {approach}.","Should've stayed dirtside, {curse}.","{cmdr} of the {ship}, last words?","Cargo manifest or vacuum \u2014 pick.","Your bounty pays my fuel, {cmdr}.","Nice hull. Be nicer as scrap.","You a courier or a coffin, {ship}?","Broadcasting: {ship} marked. Cut her open.","Federation ain't coming. Not out here.","Say hi to the void, {cmdr}.","You brought {cargo}% cargo to a knife fight.","That's a fine {ship}. Be a shame if it stopped flying.","Comms are hot, guns are hotter, {cmdr}.","Every second you drift, you owe me another credit.","Bounty on you says ambitious. Corpse says overcooked.","Slow-burn courier? Slower-burn corpse. Same difference.","This lane's ours by right of guns, {cmdr}.","Peel that {ship} like a ration can, boys.","You should've picked a bigger hull, or a bigger set of nerves.","Split her open \u2014 the black takes what we don't.","I'll trade your beacon for a bounty at any grey dock, {cmdr}.","You fly like paperwork. Neat, slow, filed under 'expired'.","Guns hot on the {ship}. Say goodnight to {sector}.","Bet you cargo-to-hull my burn beats your jink.","That transponder's about to be someone else's souvenir.","Hail the wing \u2014 {cmdr}'s hull is on the menu.","Nothing personal, {cmdr}. Just quarterly numbers."],boss_hostile:["So THIS is the {cmdr} the bounty board's been screaming about.","Name's on my hull. Yours will be on my log tonight.","Wing \u2014 hold. I want the {ship} personally.","Every captain I killed had that same look, {cmdr}.","Half the sector wants your kill-mark. I got here first.","Broadcasting: this hull is mine. Come and remember me.","You made the boards, {cmdr}. Enjoy the last verse.","Guns free on the {ship}. No cargo, no manifest \u2014 just meat.","I don't chase small fry. I hunt commanders.","You brought a hobbyist loadout to a professional's lane.","I've buried commanders with better paint jobs than yours.","You want a warning shot? That's what your hull is.","Cmdr {cmdr} \u2014 I've been paid in advance for this kill.","Wing, weapons cold. This one's mine end-to-end.","Every scar on my hull came from a captain who fought harder than you.","I write the epitaphs on this lane, {cmdr}. Yours is short."],friendly:["Safe vectors, Cmdr {cmdr}.","{ship}, you're clear to pass. {praise}.","{fac} thanks you, {cmdr}. Watch the {sector} lanes.","Heard about your {kills} kills \u2014 fly true.","Need anything? Nearest dock pings from {sector}.","Eyes up \u2014 {rumor}.","Convoy running clean today. Fly with us if you like.","Been reading your bounty tally, Cmdr. Keep at it.","If you see a mayday out here, squawk it up the lane.","Coffee's terrible, company's fine. Come say hi at {sector}.","Wing formation's tight today. Nice to see, {cmdr}.","Lanes are calm. We'll take a quiet shift.","Fly under our colors sometime \u2014 the pay's honest.","Cmdr, if the black gets loud, we're a squawk away.","Bounty scanner's noisy today \u2014 mind your six.","Half our lane rides on kindness. Yours is banked.","Wing salutes the {ship}. That paint job earned it.","Cmdr {cmdr}, our medic says thanks for the last resupply run.","If you're hauling {ore}, we know a buyer paying above spot.","Lane's ours till dusk cycle. Fly warm, {cmdr}.","Kids on the promenade know your callsign, {cmdr}. Fly true.","We logged your assist last week. Round's on us at any Fed dock.","Reputation panel says you're welcome home, {cmdr}.","That's a courier's burn if I ever saw one. Safe lanes.","Convoy leader hails the {ship} \u2014 thanks for keeping the lane clean."],neutral:["{ship}, mind your wake.","Guild traffic, hold lanes near {sector}.","Got rocks to sell, push off.","Heard {rumor}. Probably nothing.","Comms check \u2014 read you five-by, {cmdr}.","If you see {curse} types out here, don't engage.","Long haul today. Company's welcome \u2014 trouble isn't.","You buying? I'm selling. Otherwise, drift on.","Manifest's clean, {cmdr}. Don't get creative.","This lane's slow. Sun's warm. That's the report.","Guild rate today: pay me or don't hail me.","Ore's moving. Fuel isn't. Do the math.","You look like credit, {cmdr}. Or trouble. Same thing sometimes.","Long-hauler code: hail early, dock later, spend never.","Not my sector, not my mayday. Might be yours though.","You want gossip, {cmdr}? Cheap for cargo, free for fuel.","Guild dues paid, lane fees paid, insurance\u2026 pending. Same as always.","Every captain's got a story. Mine's boring. Keep it that way.","Refinery's paying premium on {ore} this cycle. Word to the wise.","You didn't hear this from me, but the patrol beat's short-staffed.","Fly under someone's colors long enough and you forget your own.","Slow burn, low overhead, home before shift end. That's the trade.","Guild says a new lane's opening near {sector}. Grain of salt."],station:["...automated beacon, {sector}: dock fees waived this cycle.","Approach vector clear for {ship}. Welcome, {cmdr}.","Maintenance bay open. Refits at standard rate.","Advisory: {weather}.","Market tick \u2014 ore moving well today.","Manifest scan ready when you dock, {cmdr}.","Docking clamps standing by for {ship}. Cmdr {cmdr}, welcome.","Beacon nominal, {sector} traffic light. Come on in.","Bounty board updated \u2014 new marks posted this cycle.","Hydro cycling \u2014 recycled air tastes like {coffee} again. Sorry.","Docking control: pad four's yours if you like the view of the star.","Shipwright's got a slot open \u2014 refits go quick this shift.","Bar's open till the next tick. Bring credits and stories.","Refuel gantry green \u2014 pull in slow and we'll top your tanks, Cmdr.","Bounty office logs {kills} kills for you. Payout window's open.","Rumor mill: {rumor}. Take it with your ration salt.","Beacon calibrated. Approach vectors clean for the {ship}.","Shipwright's apprentice just qualified \u2014 refit rates are a hair lower.","Long-range comms picked up mayday traffic near {sector}. Patrol's rolling.","Recruiter's in the bar taking sign-ons. Just so you know, Cmdr.","Station chapel's open this cycle if you need a quiet room."],planet:["Surface comms crackle: {weather}.","{speaker} tradehouse requests manifests from the {ship}.","Atmospheric thermals strong over the northern arc.","Local chatter mentions {rumor}.","Orbital relay {hailVerb} you, Cmdr {cmdr}.","Unpopulated world \u2014 automated relay only, Cmdr.","Sensors log dust storms over the equator this rotation.","Downwell winds are ugly. Wouldn't recommend a drop.","Old sensor mast pings against the ionosphere \u2014 beautiful racket.","Nothing but weather and rock down there, {cmdr}. Save the fuel.","Automated telemetry reports crustal tremors on the day side.","Auroras coming in strong. Comms will crackle for the next few ticks.","Ancient relay still whispering. No one's listened in a long time."],planet_populated:["Colony control to {ship} \u2014 landing pads clear, welcome down, Cmdr {cmdr}.","Tradehouse open \u2014 ore moving at spot, fuel at market rate.","Downwell traffic advisory: {weather}.","{speaker} bazaar {hailVerb} the {ship} \u2014 bring cargo, leave credits.","Colony militia on the beat \u2014 {praise}, {cmdr}.","Manifest scan queued. Step aboard when you're locked, {cmdr}.","Kids on the promenade counting hulls \u2014 you're number {kills} this cycle.","Fresh water on tap, {cmdr}. First round's on the colony.","Ore prices holding steady \u2014 buyers hungry for {ore} units this rotation.","Ring lights up when you're on final. Bring her in gentle.","Militia's dry today. Any {curse} types come with you, sing out.","Recruiters at the tradehouse \u2014 hiring hands out of dirtside.","Colony brewhouse serving the {sector} lager. Warn your liver.","Landing beacon steady. Bring the {ship} in whenever you're ready, Cmdr.","Chapel bells at dusk cycle. Even the void keeps time.","Colony council thanks the last Cmdr who cleared our lane. Might've been you.","Kids running dockside races again. Watch your approach, {cmdr}.","Manifest office short-staffed today. Bring patience, not just credits.","Fresh medics on shift. If you're hurting, we're stitching."],patrol:["SPD Patrol to {ship} \u2014 maintain course, {cmdr}.","Space Police, {sector} beat. {praise}, Cmdr.","Any {curse} in your six, {cmdr}? Squawk and we're on 'em.","SPD advisory \u2014 {rumor}. Fly clean.","{ship}, we log this lane. Behave and we're friends.","Fuel dry? Squawk mayday \u2014 we'll tow you to dock.","Patrol pinging {ship} \u2014 hull {hull}%, doing alright?","Attack a lawful hull in our range, Cmdr, and we return the favor.","SPD to all traffic: keep weapons cold on approach lanes.","Coffee's cold, guns are warm. Standard shift.","Cruiser {ship} logged. Move along, {cmdr}.","Fly straight, hail early, and we're friends this shift.","New lawful hull just launched from {sector}. Say hi.","Report {curse} activity on this band, Cmdr. We answer maydays.","SPD to {sector}: any lit hostiles, squawk 'em. We roll fast.","Cruiser's got fuel to burn. Wave if you see grief.","Patrol logs today's fly-bys. Yours reads clean, {cmdr}.","Wing check \u2014 all cruisers on-station, all guns cold. Textbook.","SPD to any hull: mayday within {sector}? Squawk and we roll.","Cmdr {cmdr}, keep that transponder loud. Silent ships get scanned.","Patrol pass through {sector} \u2014 no contraband today, no problems today.","Cruiser's coffee is Fed-standard bad. Miss home already.","SPD to {ship}: keep clear of the beacon lattice, {cmdr}.","Any captain running from us today is running toward us tomorrow.","Patrol wing signing off shift \u2014 replacements inbound, coverage seamless."],patrol_tow:["SPD to {target}: sit tight, tractor locking on.","Patrol has your mayday, {target}. Tow inbound \u2014 no charge.","Hooking the {target}. Nearest lawful dock in {sector}, ETA short.","Stranded hull acquired. Cmdr {cmdr}, hold your lane while we drag.","Tractor beam engaged on {target}. Sit tight, we've got the burn.","Patrol tug to {target}: nice and gentle, we'll have you dockside soon.","Cmdr, tell {target}'s crew we've got water and rations in the hold.","Beacon triangulated. Towing {target} home \u2014 no charge, no lecture."],patrol_arrest:["SPD to {ship}: cease fire and stand down. This is your only warning.","You lit up a lawful hull, {cmdr}. Patrol is now engaging.","Guns hot on {ship}. Drop shields or drop hull, your call.","Weapons free on {ship}. Compliments of the {sector} beat.","You broke the peace, {cmdr}. We're here to remake it.","Patrol wing converging on {ship}. Drop weapons or drop hull.","Cmdr {cmdr}, this is your one chance to squawk surrender.","SPD to {ship}: your bounty just tripled. Congratulations."],stranded_mayday:["MAYDAY, MAYDAY \u2014 {ship} drifting, no fuel, any vessel please respond.","Comms open \u2014 dead in the water. Squawking on all bands.","Reactor's cold. Life support on batteries. Anyone reading?","{fac} freighter {ship} broadcasting mayday. Please advise.","Fuel's out, patience thin. Tow, please. Anyone.","Batteries at half, crew rationing air. Any hull in range?","This is {ship}, adrift on the {sector} lane. Squawking mayday.","If you're listening: we can pay in cargo for a top-up.","Kids are scared. Fuel's dry. We just need someone to slow down.","Any hull, any faction \u2014 we'll take the tow. Beggars, not choosers.","Broadcasting on repeat: {ship} adrift. Please, any response.","Life support at 40%. If anyone reads: {ship}, {sector} lane, MAYDAY.","Reactor scrammed on the last jump. We are dead-drift and squawking.","Please. Any hull. Kids on board. Fuel's gone.","This is {ship}, we are broadcasting in the blind. Anyone. Please.","Beacon on continuous. Fuel indicator flat. Time indicator against us.","Any patrol on the lane: {ship}, adrift, squawking mayday, please advise."],crit_hit:["\u2605 CRIT \u2014 {target} rocked.","\u2605 CRITICAL HIT on {target}.","\u2605 Solid hit, {target} is smoking.","\u2605 Clean crit \u2014 {target}'s glowing.","\u2605 Punched through \u2014 {target} is venting.","\u2605 Weak point breach \u2014 {target} is spitting sparks.","\u2605 Sweet spot on {target} \u2014 that one hurt.","\u2605 Reactor sympathetic \u2014 {target} is cooking from the inside.","\u2605 That's a systems kill on {target} \u2014 capacitor's dumped.","\u2605 Cored the {target} \u2014 armor plating cracked wide.","\u2605 Painted a weak seam on {target} and rode it home.","\u2605 Textbook crit. {target}'s telemetry is screaming."],npc_crit:["\u203C HULL BREACH \u2014 that shot went deep.","\u203C Direct hit! Damage control to all decks.","\u203C They found a seam, Cmdr \u2014 brace!","\u203C Critical strike registered \u2014 hull integrity dropping.","\u203C Ouch. That was a clean shot on us.","\u203C Warning: armor compromised on the port quarter!","\u203C Sparks in the crew deck \u2014 that hit was a crit.","\u203C They rang the bell on us, Cmdr. Reactor's yelling.","\u203C Whoever shot that got paid extra. Ouch."],walkout:["That's it \u2014 I'm off at the next dock. Morale's dust.","Pack my kit. This tour's over, {cmdr}.","You couldn't feed the crew, you can't keep 'em. I'm out.","Walking. Find someone else to bleed for {credits}cr.","Been a pleasure. It hasn't. I'm gone.","Log me as departed, Cmdr. Empty bunks pay empty wages.","Rations are thin and the wages are thinner. I'm off.","Cmdr \u2014 I signed for a ship, not a rolling coffin. Bye.","Tell the next hire the coffee's terrible and the captain's worse.","I'll walk to a station on foot before I take another shift here.","Better tours out there. Cheaper bunks, warmer captains. Gone."],stranded_thanks:["Bless you, {cmdr}. Fuel in the tanks and stars in my sights.","That top-up saved the crew. We owe you a round in {sector}.","You didn't have to stop \u2014 but you did. Fly safe.","Reactor's warm again. Thank you kindly, {ship}.","The lanes remember kindness. So do we. Safe vectors.","Kids say hi, Cmdr. Fuel's a miracle. So are you.","We'll pay it forward on the next mayday we hear.","You bought us another cycle, {cmdr}. Won't forget it.","Squawking your callsign as friend-of-lane. Fly true."],gunner_idle:["Quiet out here. {weather}.","{smalltalk}.","Hull's at {hull}%, shields {shield}%. Comfortable.","We've got {credits} credits and {cargo}% cargo. Not bad.","Sector {sector} feels off. Could be nothing.","Kill count's {kills}, Cmdr. You're getting sharp.","Strange stars this sector. {weather}.","Guns are warm and I'm bored. Bad combination.","You ever notice pulsars keep time better than my last chrono?","If we see a \u2020, that's a derelict. Free money, no shooting.","Black holes on the scope. Give them a wide berth, {cmdr}.","That {ship} handles nicer than the last three I've been on.","One good crit and even a raider captain rethinks his day.","You know a Federation escort'll roll the whole wing for one lit hostile?","Colonies pay ore premiums, {cmdr}. Filed under 'good to know'.","Bounty payouts settle faster at Fed stations. Don't hold pirate marks too long.","You'd be surprised what a clean transponder buys you at a patrol scan.","Rumor mill from the last dock: {rumor}. Take it or don't.","Half my scars are from taking the second shot. Take the first one, {cmdr}.","Star's flaring. Good day to mine coronas, bad day to loiter."],gunner_hostile:["On {target}! Firing!","{target} in the reticle \u2014 burn 'em!","Got the lock \u2014 {target}'s {threat}!","Eat plasma, {curse}!","Range good, {target} lit up!","Splash-two-in-progress on {target}!","Trace round on {target} \u2014 walk it in!"],gunner_mine:["Chewing rock \u2014 {ore} in the hold.","Nice vein. Cargo at {cargo}%.","Mining {target}, hold her steady.","Ore tally: {ore}. Keep us pointed.","Chip, chip, chip. My favorite music."],gunner_dock:["Suggest we dock at {target}, Cmdr.","{target} looks safe. Fuel's at {fuel}%.","Could use a stretch \u2014 {target}'s right there.","Hull {hull}%, shields {shield}% \u2014 dock at {target}?","I could use a hot meal. {target}'s got a tradehouse."],gunner_hit:["We're taking fire! Hull {hull}%!","Shields buckling \u2014 {shield}% left!","Hold her steady, {cmdr}!","That's coming from {nearest}!","Evasive! Hull at {hull}%!","Whoever's shooting us \u2014 they'll regret it.","Rounds off the bow, {cmdr} \u2014 jink!"],gunner_greet:["On board, Cmdr. Press G to toggle me.","{cmdr}! Heard you needed a trigger finger. Glad to ride.","Permission to stow my kit? Beautiful ship, this {ship}.","Reporting for duty. Coffee tastes like {coffee} here too \u2014 perfect.","Cmdr {cmdr}, I'll keep your six warm. Press G to put me to work.","First time aboard a {ship}. Don't let me down and I won't let you.","Last captain owed me three jumps' wage. You won't, right?","{praise}, that's what I want to see. Let's burn some {curse} types.","Quiet bunk, working guns \u2014 that's all I ask. G to wake me up."],gunner_farewell_good:["Been an honor, Cmdr. {praise} out there.","Safe vectors, {cmdr}. I'll buy the first round.","Keep the {ship} clean. You're a fine pilot.","If you ever need a gun again, I'm in {sector}.","Cmdr \u2014 thanks for the ride. {kills} kills together. Not bad."],gunner_farewell_bad:["Should've signed with the Guild. Good riddance.","Pay's late, hull's wrecked \u2014 I'm done. Don't call.","Hope your next gunner likes {curse}s as much as you do.","Fly into a star for all I care, Cmdr.","Worst tour I ever flew. Out.","Empty pay chit, empty magazine. I'm walking."],gunner_kill:["{target} \u2014 splashed!","That's another {curse} for the void.","Scratch one. Kill count: {kills}.","Cleaner than I expected. Nice angle.","Down they go. Manifest 'em, Cmdr.","Hostile scratched. Loot on the plot."],gunner_docked:["Solid dock. I'll stretch the legs.","Fuel's flowing, hull's mending. Good call, Cmdr.","Beacon's friendly. I'll grab a {coffee}.","Nice approach. Some of my old captains couldn't park a barge."],gunner_cargofull:["Hold's full, Cmdr \u2014 find a buyer.","Cargo at max. Time to offload.","No room for more rock. Dock somewhere?"],pilot_idle:["Steady vector, Cmdr. {weather}.","Nice ride, this {ship}. Handles better than my last posting.","{smalltalk}.","If you want me to take the stick, tag a target and hit O.","Sector {sector} logged. Clean drift.","Fuel at {fuel}%. Want me to plot a scoop pass?","Scope shows a black hole nearby. I'll route around it, Cmdr.","Picked up a derelict on the fringe. Worth a swing if we've got hold room.","That pulsar's ticking like a metronome. Kind of soothing, actually.","Wormhole on the plot \u2014 cheapest jump you'll ever fly.","Sensors say we've got clean sky for the next few thousand units.","Cmdr, if you tag a station, I'll take her in without you touching the stick.","Grav well ahead \u2014 I'll bank us wide, saves the fuel curve.","This lane rides smoother at low throttle. Just an observation.","Ancient beacon a few clicks out. Sends nothing useful. Still charming."],pilot_greet:["Pilot reporting, Cmdr {cmdr}. Tag a target, hit O, and I'll fly it.","Nav chair's warm \u2014 glad to ride the {ship}. O toggles autopilot.","Flown three of these before. Docking's the easy part.","Cmdr \u2014 I don't crash. Everything else is negotiable."],pilot_autopilot_on:["I've got the stick. Plotting to {target}.","Course locked on {target} \u2014 ETA short.","Hands off, Cmdr. Bringing us in on {target}.","Autopilot engaged. Try not to sneeze on the fire button."],pilot_autopilot_off:["Stick's yours, Cmdr.","Disengaging \u2014 you fly better than the manual says anyway.","Handing back. Watch the pitch.","Autopilot off. Yell if it gets weird."],pilot_docking:["Matching velocity with {target}. Hold on.","Bringing us to a stop at {target} \u2014 perfect approach.","Docking pattern locked, {target} beacon has us."],pilot_farewell_good:["Best captain I've flown for. Safe vectors, {cmdr}.","Cmdr \u2014 thanks. I'll spread the word in {sector}.","Fly the {ship} true. She likes you."],pilot_farewell_bad:["You steer like a drunk asteroid. Out.","Rather push a barge dirtside than fly for you again.","Cmdr, you owe me a bar tab and a therapist."],engineer_idle:["Hull's holding. Coupler harmonics look clean.","{smalltalk}.","Shield emitter running a hair warm \u2014 nothing critical.","Fuel flow's efficient today. {praise}, Cmdr.","I could rebuild this reactor blind. Don't test me.","Reading a soft hum on the port thruster. I'll watch it.","Reactor's within margin. Boring. That's the compliment.","Cmdr, next dock I'd like to bench-test the shield emitter. No rush.","Coolant's steady. Fuel filter's a bit tired but nothing critical.","That last hit shook a panel loose in the mess. Already re-seated.","Every good tour I've flown, the engineer's chatter is boring. Take the hint."],engineer_greet:["Engineer reporting. I'll keep the {ship} together, you keep it pointed.","Cmdr \u2014 took a look at your reactor. It'll last. Barely.","Kit's stowed, tools are hot. Let's not blow up.","I've patched worse hulls with duct tape and prayer."],engineer_repair:["Patching hull \u2014 give me a moment.","Weld's holding. Hull back to {hull}%.","Shaved off the worst of the scarring. You're welcome.","Repair pass done. Try not to undo it, Cmdr."],engineer_shields:["Shields cycling \u2014 capacitors happy.","Boosted the recharge loop. Should feel snappier.","Shield harmonics locked. That's my magic done."],engineer_fuel:["Trimmed the burn \u2014 you're getting more meters per unit now.","Reactor's sipping instead of guzzling. You're welcome.","Fuel efficiency's up. Buy me a drink at the next dock."],engineer_farewell_good:["Good ship, good captain. I'll miss the {ship}.","Cmdr \u2014 she's tuned. Don't let the next hack ruin her.","Safe vectors. Call if the reactor sings weird."],engineer_farewell_bad:["You broke everything I fixed. Twice. I'm out.","Never seen a hull this abused. Good luck, Cmdr.","Rather patch a Guild scow than another minute on this bucket."],merchant_idle:["Ore prices in {sector} are moving. Could be a play.","You've got {credits} credits burning a hole, Cmdr.","{smalltalk}.","I hear a refinery near {planet} pays 20% over spot.","Cargo at {cargo}%. When we dock, let me talk to the buyer.","Bounty board's fat this cycle. Just saying.","Colonies buy ore above spot when the storms hit. Watch the weather feeds.","Cmdr, that derelict on the fringe? Scrap alone would pay a month of wages.","Guild's tightening quotas. Move product before the freeze.","Long-hauler tip: never sell a full hold at the first station you dock.","I could turn {credits}cr into more if we swung by {sector}."],merchant_greet:["Merchant aboard, Cmdr. I'll shave 15% off the buy sheet and pad the sell.","Cmdr {cmdr} \u2014 pleasure. My cousin runs the market in {sector}. Handy.","Give me a cargo hold and a station, I'll give you profit.","I read a rumor mill better than most read a manifest."],merchant_deal:["Talked them up 15% on the ore \u2014 nice haul, Cmdr.","Got you a discount on that refit. Don't say I never earn my keep.","Buyer flinched. We won. {credits}cr looking healthier already."],merchant_broke:["Cmdr, we're broke. Rocks won't sell themselves.","Empty hold, empty pockets. Let's fix one of those.","I can't haggle nothing into something. Get us cargo."],merchant_farewell_good:["Made you money, made myself money. Textbook tour.","Cmdr \u2014 I'll invest my cut. Come find me flush in {sector}.","Solid captain, solid ledger. Fly true."],merchant_farewell_bad:["You wouldn't take a deal if it kissed you. I'm gone.","Cmdr, next captain, listen to your merchant.","Rather sell rocks door-to-door than watch you refuse a margin."],navigator_idle:["Plot's clean, Cmdr \u2014 nearest station bearing steady.","{smalltalk}.","Star charts say {rumor}. Filed it under 'maybe'.","Fuel window looks fine at this burn rate.","Wormhole density here is thin. We'd have to hunt for a shortcut.","I've got the {sector} lanes memorized. Ask any time.","Cmdr, the current burn wastes maybe 8% fuel. I can plot smoother.","Two wormholes and a scoop pass \u2014 that's your cheapest tour home.","Star charts logged for this rotation. Cleanest lane looks like the north arc.","Colony pings at bearing\u2026 hold, adjusting. There. Cheap ore, warm bar."],navigator_greet:["Navigator aboard. I'll shave a jump off every long haul, Cmdr.","Cmdr {cmdr} \u2014 I read stars like other people read faces. Glad to be here.","Charts stowed. Point me at a destination and I'll find the cheap line."],navigator_farewell_good:["Fair skies, Cmdr. I'll leave you the best charts.","Been a pleasure plotting for the {ship}. Safe vectors."],navigator_farewell_bad:["You ignored every plot I filed. Good luck without me.","Rather map dead systems than fly with a captain who won't listen."],quartermaster_idle:["Manifest's tight, Cmdr. I know where every crate lives.","{smalltalk}.","I can shave 8% off a module sticker if you let me haggle.","Rations rotated, cargo lashed. Boring is good.","Ore prices in {sector} would move if we pushed the right buyer.","Every crate accounted for, Cmdr. Cargo hold reads {cargo}%.","I could squeeze another 5% out of the next module refit if you let me talk.","Wage bill's tidy. Recruiter earns his keep by keeping mine down.","Manifest looks clean for a patrol scan. No contraband flags this time."],quartermaster_greet:["Quartermaster reporting. I'll squeeze margin out of every dock, Cmdr.","Cmdr {cmdr} \u2014 pleasure. My ledger's cleaner than most surgeons' hands.","Cargo hold's mine now. Trust the process."],quartermaster_farewell_good:["Solid ledger, solid captain. I'll invest my cut in {sector}.","Cmdr \u2014 thanks for letting me run the hold. Fly true."],quartermaster_farewell_bad:["You wouldn't take my numbers seriously. I'm out.","Rather count screws at a dry dock than watch you overpay again."],recruiter_idle:["Talked to a few candidates at the last dock. Decent pool this cycle.","{smalltalk}.","Crew morale looks steady, Cmdr. Keep the wages honest.","I know a gunner in {sector} who'd sign for cheap. Say the word.","Reputation's a currency too. We're spending it slower than most.","Morale's holding, Cmdr. Recruiter earns his coffee.","I've got two candidates lined up for the next hire \u2014 one gunner, one merc.","Bar in {sector} always has good talent. Bad prices, good talent.","Cmdr, if you ever fire a crew, do it dockside. Space walkouts are ugly."],recruiter_greet:["Recruiter aboard. I'll trim hire fees and keep the bunk happy, Cmdr.","Cmdr {cmdr} \u2014 I've placed hands on a hundred hulls. This one's mine now.","Give me a station and a bar, I'll bring you signatures."],recruiter_farewell_good:["Crew's in good shape. I'll leave you my rolodex, Cmdr.","Been an honor. Look me up in {sector} \u2014 I'll always find you a hand."],recruiter_farewell_bad:["You burned every hire I brought aboard. I'm done.","Rather post flyers on a stationary hab than watch you drive off another crewman."],tactical_idle:["Threat board's quiet. I like it quiet.","{smalltalk}.","Shield harmonics running hot \u2014 recharge's up 25%, courtesy of yours truly.","If it turns red on my scope, {cmdr}, it stops moving.","Kill count's {kills}. Half of those were my calls.","Threat board just refreshed. I don't like the pattern in {sector}.","Cmdr, when I run guns, I want two crits per engagement. Don't slow me down.","Wing tactics beat lone guns nine times out of ten. Remember that.","Shield harmonics timed to your throttle. Try boosting \u2014 you'll feel it."],tactical_greet:["Tactical officer reporting. I run the guns, {cmdr} \u2014 Gunner's redundant with me aboard.","Cmdr {cmdr} \u2014 I've boarded three Guild scows and outshot a patrol wing. You're in good hands.","Shields, targeting, priority calls \u2014 mine. You fly, I fight."],tactical_hostile:["Priority target locked \u2014 burn 'em, {cmdr}!","{target} in the reticle. Cleared to engage.","Shields nominal \u2014 trade shots if you have to."],tactical_farewell_good:["Cmdr \u2014 {kills} clean kills together. Not bad. Fly true.","Solid captain, solid ship. I'll take another contract when you call."],tactical_farewell_bad:["You wasted every shot I called. I'm out.","Rather train recruits than watch another good hull chew on plasma for no reason."],banter:["{a}: {b}, you ever going to fix that coupler?  ||  {b}: I fixed yours, {a}. Try locking the door.","{a}: If we get boarded, {b} goes first.  ||  {b}: I go first because I'm faster, not braver.","{a}: {coffee} again for dinner?  ||  {b}: Cmdr picked the ration crate. Blame the top of the food chain.","{a}: I miss {miss}.  ||  {b}: I miss silence. Please.","{a}: How long you been aboard, {b}?  ||  {b}: Long enough to know when to duck.","{a}: Bet you five creds we hit rocks before we hit a station.  ||  {b}: Cmdr can hear us, you know.","{a}: Last ship I flew, the {threat} were nicer than you.  ||  {b}: Last ship you flew is scrap. Coincidence?","{a}: Cmdr's aim is getting better.  ||  {b}: Or {a} is getting quieter about the misses.","{a}: If I fix one more coupler I'm putting my name on the hull.  ||  {b}: Please don't.","{a}: Weather's {weather}.  ||  {b}: Weather is always {weather}. That's space.","{a}: {praise}, Cmdr.  ||  {b}: Don't inflate the ego. He'll try to dock at a star.","{a}: Any word on {rumor}?  ||  {b}: Yeah, and it gets worse the closer you look.","{a}: {b}, quit humming.  ||  {b}: {a}, it's the reactor. That's a bad sign.","{a}: Cmdr's on a streak.  ||  {b}: Cmdr's on borrowed time. Same difference.","{a}: What's for shore leave?  ||  {b}: Whatever {sector} still has stocked. So, rations.","{a}: The coupler's whining again.  ||  {b}: The coupler's always whining. Ignore it or fix it.","{a}: If Cmdr docks that hot one more time \u2014  ||  {b}: \u2014 the shipwright buys a boat. Yeah.","{a}: I filed a hazard report on our approach lanes.  ||  {b}: Cmdr filed it in the airlock.","{a}: You ever pray, {b}?  ||  {b}: Only when the reactor sings. So, weekly.","{a}: We should unionize.  ||  {b}: We're two people, {a}. That's just a conversation.","{a}: Bet Cmdr can't dock without scraping.  ||  {b}: You're on. Loser buys {coffee}.","{a}: How much did the last refit cost?  ||  {b}: Don't. You'll cry.","{a}: If we hit another rock \u2014  ||  {b}: \u2014 we're calling it exploration. Sound better on the log.","{a}: Rations again.  ||  {b}: Rations forever. Welcome aboard.","{a}: What's the emergency plan?  ||  {b}: Panic loudly and hope Cmdr's listening.","{a}: Cmdr's aim was better this week.  ||  {b}: Cmdr paid the wage bill this week. Related?","{a}: You believe in luck, {b}?  ||  {b}: I believe in trajectory. Same thing, less superstition.","{a}: Cmdr's morale meeting is at 0800.  ||  {b}: The morale meeting IS the meeting. That's the whole show.","{a}: {b}, why do you keep the reactor room warm?  ||  {b}: Because the mess is cold and Cmdr's colder.","{a}: You count the bounties?  ||  {b}: I count the survivors. Cheaper math.","{a}: Ever wonder if the {threat} keep score too?  ||  {b}: Every scar on this hull says yes.","{a}: Cmdr called a course change mid-fight.  ||  {b}: Bold. Wrong, probably. But bold.","{a}: The rations menu changed.  ||  {b}: No it didn't. You just read the label wrong.","{a}: We're logged as friend-of-lane at three colonies now.  ||  {b}: Four. You forgot the one in {sector}.","{a}: New engineer says the reactor's fine.  ||  {b}: New engineers always say that. Until it isn't.","{a}: If I retire, I'm buying a hab in {sector}.  ||  {b}: If you retire, I owe Cmdr five creds.","{a}: Cmdr's log entries get shorter every week.  ||  {b}: That's how you know it's going well. Or badly. One of those.","{a}: Ever miss dirtside, {b}?  ||  {b}: Only the gravity. And the sky. And the coffee. Otherwise no.","{a}: Guild recruiter tried to poach me at the last dock.  ||  {b}: What'd you say?  ||  {a}: I said the coupler needs me."]};Ls=["Mouse wheel controls throttle. Scroll up = faster.","Fly close to a star (not a black hole) with low throttle to scoop fuel.","Hire a Pilot at any station \u2014 press O to autopilot to your target.","Press L for the Codex \u2014 every glyph and color is documented.","Distress beacons pay well\u2026 but ~35% are pirate traps.","Wormholes (\xD8) come in pairs. Drop into one, come out at its sibling.","Derelict wrecks (\u2020) are free salvage. No trap, no fight.","Black holes bend your course before they eat you. Watch the drift.","Pulsars (PSR) blink because they spin. Cosmetic \u2014 but pretty.","Options \u25B8 Audio \u25B8 Radio picks in-game music, including your own stream URL.","Cargo full? Dock and sell before you mine another rock.","Save often. Permadeath is opt-in for a reason."],pn=["Human","Android","Reptilian","Aquilan","Drift-born","Sylph","Voidkin","Chorus"],Dr={Human:{bonus:"Adaptable \u2014 +3% sell / -3% buy prices",drawback:"No standout strength",sellMul:1.03,buyMul:.97,affinity:"merchant",hullUnlocks:["explorer"]},Android:{bonus:"Efficient reactor \u2014 -15% fuel burn",drawback:"-10% hull max",fuelMul:.85,hullMul:.9,affinity:"engineer",hullUnlocks:["nomad"]},Reptilian:{bonus:"Cold-blooded gunnery \u2014 -10% weapon cooldown",drawback:"-10% shield max",cooldownMul:.9,shieldMul:.9,affinity:"gunner",hullUnlocks:["warhawk"]},Aquilan:{bonus:"Sharp senses \u2014 +250u radar range",drawback:"+5% fuel burn",radarBonus:250,fuelMul:1.05,affinity:"pilot",hullUnlocks:["skyeye"]},"Drift-born":{bonus:"Void-native \u2014 +10% XP earned",drawback:"-5% top speed (fragile bones)",xpMul:1.1,topSpeedMul:.95,affinity:"merchant",hullUnlocks:["driftbarge"]},Sylph:{bonus:"Lightframe \u2014 +8% top speed, +200u radar",drawback:"-15% hull max",topSpeedMul:1.08,radarBonus:200,hullMul:.85,affinity:"pilot",hullUnlocks:["skyeye"]},Voidkin:{bonus:"Radiation-tolerant \u2014 +10% shield max",drawback:"-10% cargo capacity",shieldMul:1.1,cargoMul:.9,affinity:"engineer",hullUnlocks:["nomad"]},Chorus:{bonus:"Hive-minded \u2014 +8% XP, faster crew perks",drawback:"-5% top spe
