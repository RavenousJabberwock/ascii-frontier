}.","Nice ride, this {ship}. Handles better than my last posting.","{smalltalk}.","If you want me to take the stick, tag a target and hit O.","Sector {sector} logged. Clean drift.","Fuel at {fuel}%. Want me to plot a scoop pass?","Scope shows a black hole nearby. I'll route around it, Cmdr.","Picked up a derelict on the fringe. Worth a swing if we've got hold room.","That pulsar's ticking like a metronome. Kind of soothing, actually.","Wormhole on the plot \u2014 cheapest jump you'll ever fly."],pilot_greet:["Pilot reporting, Cmdr {cmdr}. Tag a target, hit O, and I'll fly it.","Nav chair's warm \u2014 glad to ride the {ship}. O toggles autopilot.","Flown three of these before. Docking's the easy part.","Cmdr \u2014 I don't crash. Everything else is negotiable."],pilot_autopilot_on:["I've got the stick. Plotting to {target}.","Course locked on {target} \u2014 ETA short.","Hands off, Cmdr. Bringing us in on {target}.","Autopilot engaged. Try not to sneeze on the fire button."],pilot_autopilot_off:["Stick's yours, Cmdr.","Disengaging \u2014 you fly better than the manual says anyway.","Handing back. Watch the pitch.","Autopilot off. Yell if it gets weird."],pilot_docking:["Matching velocity with {target}. Hold on.","Bringing us to a stop at {target} \u2014 perfect approach.","Docking pattern locked, {target} beacon has us."],pilot_farewell_good:["Best captain I've flown for. Safe vectors, {cmdr}.","Cmdr \u2014 thanks. I'll spread the word in {sector}.","Fly the {ship} true. She likes you."],pilot_farewell_bad:["You steer like a drunk asteroid. Out.","Rather push a barge dirtside than fly for you again.","Cmdr, you owe me a bar tab and a therapist."],engineer_idle:["Hull's holding. Coupler harmonics look clean.","{smalltalk}.","Shield emitter running a hair warm \u2014 nothing critical.","Fuel flow's efficient today. {praise}, Cmdr.","I could rebuild this reactor blind. Don't test me.","Reading a soft hum on the port thruster. I'll watch it."],engineer_greet:["Engineer
